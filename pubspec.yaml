name: smart_iot_interface
description: SMART WATER LEVEL CONTROL BD — Flutter app for ESP32-based tank monitoring via Firebase Realtime Database + BLE WiFi Provisioning.
version: 3.1.0+13
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

generate: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3

  # State management
  provider: ^6.1.2

  # Storage & preferences
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # BLE Provisioning
  flutter_blue_plus: ^1.35.3

  # Fonts
  google_fonts: ^6.2.1

  # Internationalization
  intl: ^0.20.2

  # URL Launcher
  url_launcher: ^6.3.1

  # Package info
  package_info_plus: ^8.1.2

  # Connectivity monitoring
  connectivity_plus: ^6.1.0

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permission handling
  permission_handler: ^11.3.1

  # Local notifications
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/i18n/
